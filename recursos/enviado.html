<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="robots" content="noindex, nofollow" />
    <link rel="icon" type="image/x-icon" href="../assets/iconoChrome.png" />
    <link
      href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;700&display=swap"
      rel="stylesheet"
    />
    <title>¡Email enviado!</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            colors: {
              ink: "#1d1d1b",
              paper: "#f5f5f5",
              gold: "#d9a65f",
              "gold-ink": "#1d1d1b",
            },
            fontFamily: {
              sans: ["Space Grotesk", "sans-serif"],
            },
          },
        },
      };
    </script>
  </head>
  <body
    class="w-full h-screen bg-ink text-white font-sans flex flex-col justify-center items-center p-4 text-center"
  >
    <h1 class="mb-2 text-ink">¡Tu email fue enviado!</h1>
    <p class="text-balance mb-3">
      Nos pondremos en contacto con vos lo antes posible.
    </p>
    <a
      id="volver-btn"
      href="https://capture-davinci.vercel.app"
      class="no-underline w-4/5 max-w-[400px] py-1.5 my-3 border border-paper rounded-md text-paper bg-transparent transition-colors duration-200 hover:text-gold-ink hover:bg-gold hover:border-gold cursor-pointer focus-visible:outline focus-visible:outline-2 focus-visible:outline-offset-2 focus-visible:outline-gold"
    >
      Volver a la página
    </a>
  </body>
</html>
